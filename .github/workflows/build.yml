name: build

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 30
    defaults:
      run:
        working-directory: shader-metal-template-1.21.4
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Build and test
        run: ./script/gradle_task.sh build
      - name: Upload mod artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ShaderMetal
          path: shader-metal-template-1.21.4/build/libs/*.jar
          if-no-files-found: error
